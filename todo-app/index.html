<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List App</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="todo-app">
            <!-- Header -->
            <div class="header">
                <h1>
                    <i class="fas fa-tasks"></i> My Tasks
                </h1>
                <p class="subtitle">Stay organized and get things done</p>
            </div>

            <!-- Input Section -->
            <div class="input-section">
                <input 
                    type="text" 
                    id="todoInput" 
                    class="todo-input" 
                    placeholder="Add a new task..."
                    autocomplete="off"
                >
                <button id="addBtn" class="add-btn">
                    <i class="fas fa-plus"></i> Add
                </button>
            </div>

            <!-- Filter Section -->
            <div class="filter-section">
                <button class="filter-btn active" data-filter="all">
                    <i class="fas fa-list"></i> All
                </button>
                <button class="filter-btn" data-filter="active">
                    <i class="fas fa-circle-notch"></i> Active
                </button>
                <button class="filter-btn" data-filter="completed">
                    <i class="fas fa-check-circle"></i> Completed
                </button>
            </div>

            <!-- Stats Section -->
            <div class="stats-section">
                <div class="stat">
                    <span class="stat-label">Total Tasks:</span>
                    <span class="stat-value" id="totalTasks">0</span>
                </div>
                <div class="stat">
                    <span class="stat-label">Completed:</span>
                    <span class="stat-value" id="completedTasks">0</span>
                </div>
                <div class="stat">
                    <span class="stat-label">Remaining:</span>
                    <span class="stat-value" id="remainingTasks">0</span>
                </div>
            </div>

            <!-- Todo List -->
            <div class="todo-list" id="todoList">
                <!-- Todos will be added here -->
            </div>

            <!-- Empty State -->
            <div class="empty-state" id="emptyState">
                <i class="fas fa-inbox"></i>
                <p>No tasks yet. Add one to get started!</p>
            </div>

            <!-- Action Buttons -->
            <div class="action-buttons">
                <button id="clearCompletedBtn" class="action-btn clear-btn">
                    <i class="fas fa-trash"></i> Clear Completed
                </button>
                <button id="clearAllBtn" class="action-btn delete-btn">
                    <i class="fas fa-broom"></i> Clear All
                </button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
